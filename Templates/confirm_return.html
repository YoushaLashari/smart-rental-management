<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Return Gadget</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <h1 class="text-center mb-4">Return Gadget</h1>

    {% if gadget %}
    <div class="card shadow mb-4">
        <div class="card-body">
            <h3 class="card-title">{{ gadget[1] }}</h3>
            <p class="card-text"><strong>Description:</strong> {{ gadget[2] }}</p>
            <p class="card-text"><strong>Price Per Day (PKR):</strong> {{ gadget[4] }}</p>
        </div>
    </div>

    <div class="alert alert-warning text-center">
        Are you sure you want to return this gadget?
    </div>

    <div class="text-center">
        <a href="/return/{{ gadget[0] }}" class="btn btn-warning">Yes, Return</a>
        <a href="/available" class="btn btn-secondary">Cancel</a>
    </div>
    {% else %}
    <div class="alert alert-danger text-center shadow" role="alert">
        Gadget not found. Please return to the available gadgets list.
    </div>
    {% endif %}

</div>

</body>
</html>
