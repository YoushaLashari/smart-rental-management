<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Rent Gadget</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: url('/static/images/man-with-copy-space-futuristic-device.jpg') no-repeat center center/cover;
            color: #ffffff;
            text-shadow: 2px 4px 15px rgba(0, 0, 0, 0.8);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .navbar {
            background: linear-gradient(90deg, #004e92, #000428);
            box-shadow: 0 5px 20px rgba(0, 78, 146, 0.4);
            width: 100%;
            padding: 15px 0;
            position: fixed;
            top: 0;
            z-index: 1000;
        }
        .navbar-brand {
            font-weight: 700;
            font-size: 2rem;
            color: #ffffff !important;
            letter-spacing: 1px;
        }
        .card {
            background-color: rgba(10, 15, 31, 0.9);
            border-radius: 15px;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.5);
            color: #ffffff;
            margin-top: 100px;
            width: 90%;
            max-width: 600px;
        }
        .btn-custom {
            background-color: #009688;
            border-color: #009688;
            color: #fff;
            font-weight: 600;
            padding: 15px 30px;
            border-radius: 50px;
            transition: background-color 0.3s, transform 0.3s;
            width: 100%;
            margin-bottom: 15px;
        }
        .btn-custom:hover {
            background-color: #00796b;
            border-color: #00796b;
            transform: scale(1.05);
        }
        .thank-you {
            background-color: rgba(0, 150, 136, 0.9);
            padding: 20px;
            border-radius: 15px;
            margin-top: 20px;
            text-align: center;
            font-weight: 600;
            font-size: 1.5rem;
            color: #ffffff;
            text-shadow: 2px 4px 15px rgba(0, 0, 0, 0.8);
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark">
  <div class="container">
    <a class="navbar-brand" href="/">
        <img src="/static/images/smart_rental_management_logo.png" alt="Smart Rental Management" style="height: 60px;">
    </a>
  </div>
</nav>

<div class="card shadow mb-4">
    {% if gadget %}
    <div class="card-body">
        <h3 class="card-title">{{ gadget[1] }}</h3>
        <p class="card-text"><strong>Description:</strong> {{ gadget[2] }}</p>
        <p class="card-text"><strong>Price Per Day (PKR):</strong> {{ gadget[3] }}</p>
        <form method="POST" action="/rent/{{ gadget[0] }}">
            <div class="mb-3">
                <label for="days" class="form-label">Enter number of rental days:</label>
                <input type="number" class="form-control" id="days" name="days" required min="1" max="30">
            </div>
            <button type="submit" class="btn btn-custom">Confirm Rent</button>
            <a href="/available" class="btn btn-secondary">Cancel</a>
        </form>
    </div>
    {% else %}
    <div class="alert alert-danger text-center shadow" role="alert">
        Gadget not found. Please return to the available gadgets list.
    </div>
    {% endif %}
</div>

{% if request.method == 'POST' %}
<div class="thank-you">Thank you! Your rental was successful. Enjoy your gadget!</div>
{% endif %}

</body>
</html>
