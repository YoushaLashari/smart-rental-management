<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Home - Smart Rental Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #0a0f1f;
            background: url('/static/images/digital-circle-circuit-blue-background-futuristic-technology.jpg') no-repeat center center/cover;
            color: #ffffff;
            text-shadow: 2px 4px 15px rgba(0, 0, 0, 0.8);
        }
        .navbar {
            background: linear-gradient(90deg, #004e92, #000428);
            box-shadow: 0 5px 20px rgba(0, 78, 146, 0.4);
            padding: 15px 0;
        }
        .navbar-brand {
            font-weight: 700;
            font-size: 2rem;
            color: #ffffff !important;
            letter-spacing: 1px;
        }
        .hero {
            padding: 150px 20px;
            text-align: center;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.4);
        }
        .hero h1 {
            font-size: 4rem;
            font-weight: 900;
            letter-spacing: 2px;
        }
        .hero p {
            font-size: 1.8rem;
        }
        .btn-custom {
            background-color: #009688;
            border-color: #009688;
            color: #fff;
            font-weight: 600;
            padding: 15px 30px;
            border-radius: 50px;
            transition: background-color 0.3s, transform 0.3s;
        }
        .btn-custom:hover {
            background-color: #00796b;
            border-color: #00796b;
            transform: scale(1.05);
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark">
  <div class="container">
    <a class="navbar-brand" href="/">Smart Rental Management</a>
  </div>
</nav>

<div class="hero">
    <h1>Welcome to Smart Rental Management</h1>
    <p>Rent gadgets and equipment easily at affordable prices.</p>
    <a href="/available" class="btn btn-custom">View Available Gadgets</a>
</div>

</body>
</html>
